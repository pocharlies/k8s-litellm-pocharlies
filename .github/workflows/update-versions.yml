name: Update LiteLLM version

# LiteLLM publishes to ghcr.io/berriai/litellm with semver tags.
# We track `main-stable` → pin to the latest actual semver release.

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest LiteLLM release
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, re, os

          # LiteLLM uses GitHub releases; image tag mirrors the release tag (v1.x.x)
          req = urllib.request.Request(
              "https://api.github.com/repos/BerriAI/litellm/releases/latest",
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}", "Accept": "application/vnd.github+json"}
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          latest = data["tag_name"]   # e.g. "v1.63.8"

          with open("k8s/manifest.yaml") as f:
              content = f.read()
          m = re.search(r'image: ghcr\.io/berriai/litellm:(.+)', content)
          current = m.group(1) if m else "unknown"

          # Normalize: if current is "main-stable" treat it as always-changed
          changed = current != latest

          print(f"Current: {current}  Latest: {latest}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"latest={latest}\n")
              out.write(f"current={current}\n")
              out.write(f"changed={'true' if changed else 'false'}\n")
          PYEOF

      - name: Update manifest
        if: steps.ver.outputs.changed == 'true'
        run: |
          sed -i "s|image: ghcr.io/berriai/litellm:.*|image: ghcr.io/berriai/litellm:${{ steps.ver.outputs.latest }}|g" k8s/manifest.yaml

      - name: Open PR
        if: steps.ver.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update/litellm-${{ steps.ver.outputs.latest }}
          commit-message: "chore: update LiteLLM ${{ steps.ver.outputs.current }} → ${{ steps.ver.outputs.latest }}"
          title: "chore: update LiteLLM ${{ steps.ver.outputs.current }} → ${{ steps.ver.outputs.latest }}"
          body: |
            Automated update of LiteLLM image tag.

            - **From:** `${{ steps.ver.outputs.current }}`
            - **To:** `${{ steps.ver.outputs.latest }}`

            [LiteLLM releases](https://github.com/BerriAI/litellm/releases/tag/${{ steps.ver.outputs.latest }})
          labels: dependencies
          delete-branch: true
